<!doctype html>
<meta charset="utf-8">
<title>IAM Auth Callback</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:24px;color:#1a1f2e}</style>
<h3>Completing IAM sign-in…</h3>
<p id="msg">Extracting token from IAM redirect.</p>
<script>
(function(){
  function paramsFrom(s){
    const out = {};
    if (!s) return out;
    const q = s.replace(/^[?#]/,'');
    new URLSearchParams(q).forEach((v,k)=>out[k]=v);
    return out;
  }
  const data = Object.assign({}, paramsFrom(location.search), paramsFrom(location.hash));
  const at = data.access_token || data.accessToken || data.token || data.jwt || data.id_token || null;
  const rt = data.refresh_token || data.refreshToken || null;
  const payload = { type:'iam-token', access_token: at, refresh_token: rt, state: data.state || null };
  if (at) {
    try { window.parent.postMessage(payload, location.origin); } catch(e) {}
    try { window.opener && window.opener.postMessage(payload, location.origin); } catch(e) {}
    document.getElementById('msg').textContent = 'Token received. You can close this tab.';
    setTimeout(()=>{ try { window.close(); } catch(_) {} }, 800);
  } else {
    document.getElementById('msg').textContent = 'No token was present in the IAM redirect. Check the authorize URL/response type configured for this IAM client.';
  }
})();
</script>
