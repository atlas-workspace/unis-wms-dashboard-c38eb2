<!doctype html>
<meta charset="utf-8">
<title>IAM Auth Callback</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:24px;color:#1a1f2e}</style>
<h3>Completing IAM sign-in…</h3>
<p id="msg">Extracting token from IAM redirect.</p>
<script>
(async function(){
  function paramsFrom(s){
    const out = {};
    if (!s) return out;
    const q = s.replace(/^[?#]/,'');
    new URLSearchParams(q).forEach((v,k)=>out[k]=v);
    return out;
  }
  function send(payload){
    try { window.parent.postMessage(payload, location.origin); } catch(e) {}
    try { window.opener && window.opener.postMessage(payload, location.origin); } catch(e) {}
  }
  const data = Object.assign({}, paramsFrom(location.search), paramsFrom(location.hash));
  let at = data.access_token || data.accessToken || data.token || data.jwt || data.id_token || null;
  let rt = data.refresh_token || data.refreshToken || null;
  if (!at && data.code) {
    document.getElementById('msg').textContent = 'Authorization code received. Exchanging for token…';
    try {
      const u = new URL('/api/proxy/iam/token/code', location.origin);
      u.searchParams.set('code', data.code);
      u.searchParams.set('redirectUri', location.origin + location.pathname);
      if (data.state) u.searchParams.set('state', data.state);
      const r = await fetch(u.toString(), {headers:{'Accept':'application/json'}});
      const j = await r.json().catch(()=>null);
      const d = (j && j.data) || j || {};
      at = d.access_token || d.accessToken || d.token || d.jwt || null;
      rt = d.refresh_token || d.refreshToken || null;
      if (!at) document.getElementById('msg').textContent = 'Code exchange did not return a token: ' + JSON.stringify(j || {}).slice(0,220);
    } catch(e) {
      document.getElementById('msg').textContent = 'Code exchange failed: ' + e.message;
    }
  }
  if (at) {
    send({ type:'iam-token', access_token: at, refresh_token: rt, state: data.state || null });
    document.getElementById('msg').textContent = 'Token received. You can close this tab.';
    setTimeout(()=>{ try { window.close(); } catch(_) {} }, 800);
  } else if (!data.code) {
    document.getElementById('msg').textContent = 'No token or authorization code was present in the IAM redirect.';
  }
})();
</script>
